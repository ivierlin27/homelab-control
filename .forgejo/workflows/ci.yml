# Forgejo Actions equivalent of .github/workflows/ci.yml.
# Activates as soon as an act_runner is registered against forgejo.dev-path.org;
# until then it's a no-op (Forgejo lists the workflow but cannot dispatch).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, phase-0-platform]
  schedule:
    - cron: "13 9 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run pytest
        run: pytest -q
