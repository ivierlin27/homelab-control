project: Homelab Control

lists:
  - Inbox
  - Plan Ready
  - Approved To Execute
  - In Progress
  - Needs Human Review
  - Blocked
  - Done
  - Rejected

labels:
  - safe-update
  - docs-only
  - observability-docs
  - inventory-refresh
  - sensitive
  - new_capability
  - finance
  - auth-change
  - network-exposure
  - needs-human
  - review:plan
  - review:pr
  - review:changes-requested
  - state:author-working
  - state:pr-open
  - state:review-agent
  - state:ready-to-merge
  - type:docs
  - type:deployment
  - type:research

automation:
  plan_ready:
    trigger: move-to-list
    target: Plan Ready
    action: author-agent-plan
  approved_to_execute:
    trigger: move-to-list
    target: Approved To Execute
    action: author-agent-execute
  needs_human_review:
    trigger: move-to-list
    target: Needs Human Review
    action: notify-human
