# Trimmed model fleet (2026-05-17): the only inference backend currently
# running on Alienware is alienware-vllm-strong-long.service (Qwen3-Coder-30B
# AWQ, TP=2 across both GPUs, max_model_len=131k). Until we stand up
# additional backends, all three logical names below point at the same
# upstream so existing callers (e.g. apps/_shared/rlm/subcall.py routing
# summarize/classify -> homelab-fast, code/plan -> homelab-strong) keep
# working without code changes.
#
# When we bring back a real fast model or a dedicated embeddings backend,
# repoint the corresponding model_list entry to the new upstream — agents
# need no changes.

model_list:
  - model_name: homelab-strong-long
    litellm_params:
      model: openai/homelab-strong-long-vllm
      api_base: os.environ/HOMELAB_STRONG_LONG_API_BASE
      api_key: os.environ/HOMELAB_STRONG_LONG_API_KEY
      timeout: 600
  - model_name: homelab-strong
    litellm_params:
      model: openai/homelab-strong-long-vllm
      api_base: os.environ/HOMELAB_STRONG_LONG_API_BASE
      api_key: os.environ/HOMELAB_STRONG_LONG_API_KEY
      timeout: 600
  - model_name: homelab-fast
    litellm_params:
      model: openai/homelab-strong-long-vllm
      api_base: os.environ/HOMELAB_STRONG_LONG_API_BASE
      api_key: os.environ/HOMELAB_STRONG_LONG_API_KEY
      timeout: 600

router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  retry_policy:
    max_retries: 2
    retry_backoff: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  infer_model_from_keys: false

litellm_settings:
  # Phase 0.6: per-call cost + latency to JSONL on disk; the
  # apps/litellm_cost_relay/ daemon ships the JSONL to memory-engine.
  # See apps/_shared/litellm_callbacks/custom_callbacks.py — that file is
  # mounted into the container at /app/custom_callbacks.py by the
  # alienware-model-gateway.service systemd unit. LLM_CALLS_JSONL env
  # selects the on-disk path.
  callbacks: custom_callbacks.proxy_handler_instance
