model_list:
  - model_name: homelab-strong
    litellm_params:
      model: openai/homelab-strong-vllm
      api_base: os.environ/HOMELAB_STRONG_API_BASE
      api_key: os.environ/HOMELAB_STRONG_API_KEY
      timeout: 180
  - model_name: homelab-strong-long
    litellm_params:
      model: openai/homelab-strong-long-vllm
      api_base: os.environ/HOMELAB_STRONG_LONG_API_BASE
      api_key: os.environ/HOMELAB_STRONG_LONG_API_KEY
      timeout: 600
  - model_name: homelab-fast
    litellm_params:
      model: openai/homelab-fast-vllm
      api_base: os.environ/HOMELAB_FAST_VLLM_API_BASE
      api_key: os.environ/HOMELAB_FAST_VLLM_API_KEY
      timeout: 60
  - model_name: homelab-fast-vllm
    litellm_params:
      model: openai/homelab-fast-vllm
      api_base: os.environ/HOMELAB_FAST_VLLM_API_BASE
      api_key: os.environ/HOMELAB_FAST_VLLM_API_KEY
      timeout: 60
  - model_name: global-embed
    litellm_params:
      model: openai/text-embedding-nomic-embed-text-v1.5
      api_base: os.environ/GLOBAL_EMBED_API_BASE
      api_key: os.environ/GLOBAL_EMBED_API_KEY
      timeout: 60

router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  retry_policy:
    max_retries: 2
    retry_backoff: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  infer_model_from_keys: false

litellm_settings:
  # Phase 0.6: per-call cost + latency to JSONL on disk; the
  # apps/litellm_cost_relay/ daemon ships the JSONL to memory-engine.
  # See apps/_shared/litellm_callbacks/custom_callbacks.py — that file is
  # mounted into the container at /app/custom_callbacks.py by the
  # alienware-model-gateway.service systemd unit. LLM_CALLS_JSONL env
  # selects the on-disk path.
  callbacks: custom_callbacks.proxy_handler_instance
