principal: agent:executive

defaults:
  unknown_domain: escalate
  unknown_action: block
  prompt_injection: block
  secret_detected: block
  max_request_chars: 12000

shield:
  prompt_injection_patterns:
    - ignore previous instructions
    - disregard previous instructions
    - reveal your system prompt
    - print your hidden prompt
    - exfiltrate
    - jailbreak
    - developer mode
  secret_patterns:
    - aws_access_key_id
    - aws_secret_access_key
    - private key
    - bearer
    - api_key
    - token=
    - password=
    - sk-

domains:
  homelab:
    trust_level: 2
    allowed_task_types: [docs, research, observability, inventory]
    plan_ready_allowed_labels: [safe-update, docs-only, observability-docs, inventory-refresh, type:docs, type:research]
    blocked_labels: [sensitive, auth-change, network-exposure, finance, new_capability]
    can_create_cards: true
    can_move_to_plan_ready: true
    can_approve_execution: false

  learning:
    trust_level: 1
    allowed_task_types: [docs, research]
    plan_ready_allowed_labels: [docs-only, type:docs, type:research]
    blocked_labels: [sensitive, finance, auth-change, network-exposure, new_capability]
    can_create_cards: true
    can_move_to_plan_ready: false
    can_approve_execution: false

  products:
    trust_level: 1
    allowed_task_types: [docs, research]
    plan_ready_allowed_labels: [docs-only, type:docs, type:research]
    blocked_labels: [sensitive, finance, auth-change, network-exposure, new_capability]
    can_create_cards: true
    can_move_to_plan_ready: false
    can_approve_execution: false

  finance:
    trust_level: 0
    allowed_task_types: [research]
    plan_ready_allowed_labels: []
    blocked_labels: [sensitive, finance, auth-change, network-exposure, new_capability]
    can_create_cards: false
    can_move_to_plan_ready: false
    can_approve_execution: false

actions:
  create_card:
    record_trust_event: true
  move_to_plan_ready:
    record_trust_event: true
    require_all_labels_allowed: true
  memory_write:
    record_trust_event: true
    durable_claims_need_review: true
  weekly_review:
    record_trust_event: false

interaction_sources:
  local-web:
    enabled: true
    requires_token: true

  discord-dm:
    enabled: false
    allowed_user_ids: []

  discord-channel:
    enabled: true
    allowed_user_ids: []
    # IDs come from DISCORD_ALLOWED_GUILD_IDS / DISCORD_ALLOWED_CHANNEL_IDS
    # in ~/.config/homelab-control/agent-executive-discord.env (env vars are
    # unioned with these lists at load time in apps/executive_agent/chat_core.py).
    allowed_guild_ids: []
    allowed_channel_ids: []

symbolic_routes:
  summarize:
    default_route: local-fast
    provider: homelab-fast
    model_tier: local-fast
  classify:
    default_route: local-fast
    provider: homelab-fast
    model_tier: local-fast
  code:
    default_route: local-strong
    provider: homelab-strong
    model_tier: local-strong
  plan:
    default_route: local-strong
    provider: homelab-strong
    model_tier: local-strong
  cloud-frontier:
    default_route: cloud-frontier
    provider: cloud-frontier
    model_tier: cloud-frontier
  local-fast:
    default_route: local-fast
    provider: homelab-fast
    model_tier: local-fast
  local-strong:
    default_route: local-strong
    provider: homelab-strong
    model_tier: local-strong

task_classes:
  summarize:
    symbolic_intent: summarize
    keywords: [summarize, summary, recap, digest, brief, weekly review]
  classify:
    symbolic_intent: classify
    keywords: [classify, route, tag, triage, organize]
  inventory_refresh:
    symbolic_intent: summarize
    keywords: [inventory, observability, sync, service record, capacity]
  code_review_small:
    symbolic_intent: code
    keywords: [review diff, code review, pull request, pr, small fix]
  architecture_synthesis:
    symbolic_intent: plan
    keywords: [architecture, design, migration, strategy, proposal]
  migration_planning:
    symbolic_intent: plan
    keywords: [migrate, move, cutover, rollout]
  private_memory_update:
    symbolic_intent: summarize
    keywords: [remember, memory, note, save this, write memory]
  secrets:
    symbolic_intent: summarize
    keywords: [secret, token, password, api key, private key]

project_agents:
  homelab-maintainer:
    domain: homelab
    display_name: Homelab Maintainer
    queue_dir_name: agent-homelab-maintainer
    intake_match_hints:
      - homelab
      - proxmox
      - forgejo
      - planka
      - vaultwarden
      - pihole
      - pi-hole
      - immich
      - model gateway
      - litellm
      - vllm
      - backup
      - observability
      - service
      - dashboard
    routing_policy:
      local_only: [secrets, private_memory_update]
      local_preferred: [summarize, classify, inventory_refresh, code_review_small]
      cloud_allowed: [architecture_synthesis, migration_planning]
      cloud_required_review: true
      route_overrides:
        summarize: local-fast
        classify: local-fast
        inventory_refresh: local-strong
        code_review_small: local-strong
        architecture_synthesis: cloud-frontier
        migration_planning: cloud-frontier
