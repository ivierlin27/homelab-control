# Tiered escalation policy. Loaded by apps/_shared/escalation/policy.py.
#
# See docs/plans/phase-0-platform.md Phase 0.11 for the design and
# apps/_shared/escalation/__init__.py for the consumer API.
#
# Resolution stack (last-write-wins, per field):
#   1. TierBudgets dataclass field defaults (baked in to the code)
#   2. `default` block below
#   3. `by_task_class[<class>]` block below
#   4. agent manifest's `escalation_overrides` (top-level fields)
#   5. agent manifest's `escalation_overrides.by_task_class[<class>]`
#
# Missing fields fall through. The dispatcher consumes only the final
# resolved budgets; it never sees the override stack.

schema_version: 1

default:
  tier1_budget_seconds: 300       # 5 min for the agent's own self-recovery
                                  # loop (verifier feedback included)
  tier1_max_attempts: 3           # cap iterations regardless of wall-clock
  tier2_budget_seconds: 1800      # 30 min for executive reroute
  tier3_dm_after_seconds: 14400   # 4 hours for an #approvals ping to be ack'd
                                  # before the Tier-3 handler DMs Kevin

by_task_class:
  # Homelab deploys: failures matter quickly because they often block other work.
  homelab.deploy:
    tier1_budget_seconds: 120     # 2 min
    tier3_dm_after_seconds: 600   # 10 min

  # Knowledge synthesis: no rush; let the agent reason longer before any
  # human handoff. Disable Tier 2 — knowledge work doesn't reroute well.
  knowledge.synthesize:
    tier1_budget_seconds: 1800    # 30 min
    skip_tier2: true

  # Finance categorization: advisory only; the verifier loop must produce
  # a confident answer or it's on Kevin to decide. Skip Tier 2.
  finance.categorize:
    tier1_budget_seconds: 60
    skip_tier2: true
    tier3_dm_after_seconds: 300   # 5 min — categorize blocks ledger commit

  # Finance advise (MVP-C): never reroutes. Goes straight from agent
  # self-loop to Kevin DM on failure.
  finance.advise:
    tier1_budget_seconds: 30
    skip_tier2: true
    tier3_dm_after_seconds: 300

  # CI failure triage (future autonomous worker per
  # platform_followup_ci_auto_triage). Two attempts; if it can't fix a
  # build the human needs to know fast.
  ci.triage:
    tier1_budget_seconds: 900     # 15 min — most builds finish in <5 min
    tier1_max_attempts: 2
    tier3_dm_after_seconds: 1800  # 30 min
