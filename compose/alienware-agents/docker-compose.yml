services:
  homelab-author:
    image: python:3.12-slim
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    env_file:
      - /run/homelab-control/agent-homelab.env
    volumes:
      - ../../:/workspace:rw

  review-agent:
    image: python:3.12-slim
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    env_file:
      - /run/homelab-control/agent-review.env
    volumes:
      - ../../:/workspace:rw
