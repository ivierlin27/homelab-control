services:
  vaultwarden:
    image: vaultwarden/server:1.35.4
    restart: unless-stopped
    env_file:
      - /run/homelab-control/vaultwarden.env
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "false"
      ROCKET_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - vaultwarden_data:/data

volumes:
  vaultwarden_data:
