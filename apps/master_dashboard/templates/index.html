{% extends "base.html" %}

{% block content %}
  <section class="xl:col-span-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden"
           hx-get="/tiles/cost" hx-trigger="every 60s" hx-swap="innerHTML">
    {% include "_tile_cost.html" %}
  </section>

  <section class="xl:col-span-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden"
           hx-get="/tiles/presence" hx-trigger="every 15s" hx-swap="innerHTML">
    {% include "_tile_presence.html" %}
  </section>

  <section class="xl:col-span-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden"
           hx-get="/tiles/backup" hx-trigger="every 5m" hx-swap="innerHTML">
    {% include "_tile_backup.html" %}
  </section>

  <section class="xl:col-span-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden"
           hx-get="/tiles/schedule" hx-trigger="every 60s" hx-swap="innerHTML">
    {% include "_tile_schedule.html" %}
  </section>

  <section class="xl:col-span-2 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
    {% include "_tile_audit.html" %}
  </section>
{% endblock %}
