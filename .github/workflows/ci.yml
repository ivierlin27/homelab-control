name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, phase-0-platform]
  schedule:
    # Nightly run at 09:13 UTC = 02:13 PT (extra "world changed" canary,
    # in case our Alienware nightly is offline). Random minute avoids
    # the on-the-hour stampede that GitHub schedulers warn about.
    - cron: "13 9 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest -q
